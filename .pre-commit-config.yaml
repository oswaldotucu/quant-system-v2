repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: pyright
        name: pyright type check
        entry: uv run pyright src/
        language: system
        types: [python]
        pass_filenames: false

      - id: regression-guard
        name: regression test guard
        entry: uv run pytest tests/regression/ -x -q
        language: system
        pass_filenames: false
        stages: [push]
