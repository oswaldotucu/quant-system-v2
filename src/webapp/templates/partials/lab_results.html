<div class="space-y-3">
  <h2 class="text-sm font-bold text-yellow-400">Backtest Results</h2>
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">Profit Factor</div>
      <div class="text-lg font-bold {% if pf >= 1.5 %}text-green-400{% elif pf >= 1.0 %}text-yellow-400{% else %}text-red-400{% endif %}">
        {{ "%.3f"|format(pf) }}
      </div>
    </div>
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">Trades</div>
      <div class="text-lg font-bold text-white">{{ trades }}</div>
    </div>
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">Win Rate</div>
      <div class="text-lg font-bold {% if win_rate >= 0.5 %}text-green-400{% else %}text-red-400{% endif %}">
        {{ "%.1f%%"|format(win_rate * 100) }}
      </div>
    </div>
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">Sharpe</div>
      <div class="text-lg font-bold {% if sharpe >= 1.0 %}text-green-400{% elif sharpe >= 0 %}text-yellow-400{% else %}text-red-400{% endif %}">
        {{ "%.3f"|format(sharpe) }}
      </div>
    </div>
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">$/day</div>
      <div class="text-lg font-bold {% if daily_pnl > 0 %}text-green-400{% else %}text-red-400{% endif %}">
        ${{ "%.2f"|format(daily_pnl) }}
      </div>
    </div>
    <div class="bg-gray-800 rounded p-3">
      <div class="text-gray-500 text-xs">Max DD %</div>
      <div class="text-lg font-bold text-red-400">
        {{ "%.1f%%"|format(max_dd_pct) }}
      </div>
    </div>
    <div class="bg-gray-800 rounded p-3 col-span-2">
      <div class="text-gray-500 text-xs">Total Return %</div>
      <div class="text-lg font-bold {% if total_return_pct > 0 %}text-green-400{% else %}text-red-400{% endif %}">
        {{ "%.2f%%"|format(total_return_pct) }}
      </div>
    </div>
  </div>
</div>
